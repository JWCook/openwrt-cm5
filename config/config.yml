# OpenWRT Configuration
# Copy this file to config.yml and fill in your values

# Required: Wireguard VPN config
vpn:
  interface:
    private_key: "privkey"
    address: "10.2.0.2/32"
    address_v6: "2a07:b944::2:2/128"  # optional
    dns: "10.2.0.1"
    dns_v6: "2a07:b944::2:1"  # optional
  peer:
    public_key: "pubkey"
    endpoint: "vpn.example.com:51820"

# AdGuard Home credentials
adguard:
  user: "admin"
  pass: "changeme"

# Optional: Dropbear SSH config (remove if unused)
ssh:
  pubkey: "pubkey"
  port: 22

# Optional: wifi networks to configure (remove if unused)
wifi:
  # Uplink: WAN client connection via Travelmate
  uplink:
    ssid: "ssid"
    password: "pass"
    # Reference: https://openwrt.org/docs/guide-user/network/wifi/basic#encryption_modes
    encryption: psk2

  # AP: LAN access point on radio1 (optional)
  ap:
    ssid: "ssid"
    password: "pass"
    encryption: psk2

# Packages to install/remove
packages:
  add:
    # USB/WiFi drivers
    - block-mount
    - kmod-mt76x2u
    - kmod-r8169
    - kmod-usb3
    - kmod-usb2
    - kmod-usb2-pci
    - kmod-usb-net-rndis

    # General LuCI packages
    - luci
    - luci-app-firewall
    - luci-app-package-manager
    - luci-mod-admin-full
    - luci-mod-network
    - luci-mod-status
    - luci-mod-system
    - luci-proto-ipv6
    - luci-ssl
    - luci-theme-material
    - uhttpd
    - uhttpd-mod-ubus

    # Additional applications/services
    - adguardhome
    - banip
    - luci-app-banip
    - mwan3
    - luci-app-mwan3
    - sqm-scripts
    - luci-app-sqm
    - travelmate
    - luci-app-travelmate
    - wireguard-tools
    - luci-proto-wireguard
    - kmod-wireguard

    # Misc wireless/security networking tools
    - ca-bundle
    - ca-certificates
    - conntrack
    - iw
    - wireless-tools
    - wpad-openssl

    # CLI utils for admin/setup/testing convenience (not required for router operation)
    - curl
    - fish
    - htop
    - iperf3
    - iputils-ping
    - iputils-tracepath
    - jq
    - netcat
    - pv
    - rsync
    - shadow
    - sudo
    - tcpdump-mini
    - tmux
    - vim-full
    - wget
    - xz
    - xz-utils

  # Conflicting packages to remove from default image
  remove:
    - wpad-basic-mbedtls

# OpenWRT imagebuilder options
imagebuilder:
  CONFIG_TARGET_ROOTFS_EXT4FS: n  # Skip building ext4 images
  CONFIG_TARGET_ROOTFS_SQUASHFS: y
  CONFIG_TARGET_ROOTFS_PARTSIZE: 150  # In MB
  CONFIG_BUSYBOX_CONFIG_FEATURE_EDITING_SAVEHISTORY: y
